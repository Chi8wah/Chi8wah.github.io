<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>德州扑克记账台</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --primary: #10b981;
            /* 翡翠绿 */
            --primary-dark: #059669;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f3f4f6;
            --text-sub: #9ca3af;
            --border: #404040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 通用组件 */
        button {
            border: none;
            outline: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        input,
        select {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            outline: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            padding: 12px;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
            padding: 12px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-sub);
            padding: 8px;
        }

        .hidden {
            display: none !important;
        }

        /* 布局容器 */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* 首页 - 设置 */
        .setup-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .player-item:last-child {
            border-bottom: none;
        }

        /* 房间页 - 顶部 */
        .game-header {
            background: var(--card-bg);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .room-info h1 {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: normal;
        }

        .pot-display {
            font-size: 24px;
            color: var(--warning);
            font-weight: bold;
            margin-top: 4px;
        }

        .rank-btn {
            background: #374151;
            color: var(--text-main);
            padding: 8px 16px;
            font-size: 14px;
        }

        /* 房间页 - 日志 */
        .log-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #121212;
        }

        .log-item {
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.4;
            color: var(--text-sub);
            border-left: 2px solid var(--border);
            padding-left: 8px;
        }

        .log-time {
            color: #6b7280;
            font-size: 12px;
            margin-right: 6px;
        }

        .log-highlight {
            color: var(--primary);
            font-weight: bold;
        }

        .log-win {
            color: var(--warning);
        }

        /* 房间页 - 底部操作 */
        .action-bar {
            background: var(--card-bg);
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
            border-top: 1px solid var(--border);
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 50px;
            font-size: 14px;
            border-radius: 8px;
        }

        .btn-bank {
            background: #374151;
            color: white;
        }

        .btn-bet {
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-win {
            background: #b45309;
            color: white;
        }

        /* 弹窗 Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            /* 底部弹出 */
        }

        .modal-content {
            background: var(--card-bg);
            width: 100%;
            border-radius: 16px 16px 0 0;
            padding: 20px;
            animation: slideUp 0.3s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }

        .close-btn {
            background: transparent;
            color: var(--text-sub);
            font-size: 24px;
            padding: 0 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-pill {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            padding: 8px;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .quick-btn {
            background: #374151;
            color: white;
            padding: 8px 0;
            font-size: 14px;
            border-radius: 4px;
        }

        /* 排行榜表格 */
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .rank-table th {
            text-align: left;
            color: var(--text-sub);
            font-weight: normal;
            padding: 8px 4px;
            font-size: 12px;
            border-bottom: 1px solid var(--border);
        }

        .rank-table td {
            padding: 12px 4px;
            font-size: 14px;
            border-bottom: 1px solid #333;
        }

        .score-pos {
            color: var(--danger);
        }

        /* 盈利是红色（类比股票红涨绿跌，或反过来，这里用红色醒目） */
        .score-neg {
            color: var(--primary);
        }

        /* --- 新增样式：玩家选择按钮网格 --- */
        .player-grid {
            display: flex;
            flex-wrap: wrap;
            /* 允许换行 */
            gap: 8px;
            /* 按钮间距 */
            margin-bottom: 10px;
        }

        .p-btn {
            flex: 1 1 30%;
            /* 只要空间允许，每个按钮占约 1/3 宽度 */
            min-width: 80px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-sub);
            padding: 10px 4px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }

        .p-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>

<body>

    <!-- 1. 首页：设置 -->
    <div id="view-setup" class="container">
        <div class="scroll-area">
            <h1 style="text-align: center; margin: 30px 0;">♣️ 德州扑克记账台</h1>

            <div class="setup-card">
                <div class="form-group">
                    <label class="form-label">初始筹码 (Buy-in)</label>
                    <input type="number" id="setup-initial-stack" value="1000">
                </div>
            </div>

            <div class="setup-card">
                <div class="form-group">
                    <label class="form-label">添加玩家</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="setup-player-name" placeholder="输入昵称">
                        <button class="btn-primary" style="width: 80px;" onclick="addPlayer()">添加</button>
                    </div>
                </div>
                <div id="player-list">
                    <!-- 玩家列表动态插入 -->
                </div>
            </div>

            <button class="btn-primary" style="width: 100%; margin-bottom: 10px;" onclick="startGame()">开始新游戏</button>
            <button id="btn-continue" class="btn-outline hidden" style="width: 100%;"
                onclick="continueGame()">继续上局游戏</button>
        </div>
    </div>

    <!-- 2. 游戏页 -->
    <div id="view-game" class="container hidden">
        <!-- 顶部 -->
        <div class="game-header">
            <div class="room-info">
                <div id="room-id">桌号: #888</div>
                <div class="pot-display">底池: <span id="display-pot">0</span></div>
            </div>
            <button class="rank-btn" onclick="showRankModal()">📊 排行榜</button>
        </div>

        <!-- 中部：日志 -->
        <div class="log-area" id="log-container">
            <!-- 日志动态插入 -->
        </div>

        <!-- 底部：操作 -->
        <div class="action-bar">
            <button class="action-btn btn-bank" onclick="showBankModal()">
                <span>🏦</span>
                <span>筹码管理</span>
            </button>
            <button class="action-btn btn-bet" onclick="showBetModal()">
                <span>💰</span>
                <span>下 注</span>
            </button>
            <button class="action-btn btn-win" onclick="showWinModal()">
                <span>🏆</span>
                <span>收回筹码</span>
            </button>
        </div>
    </div>

    <!-- 模态框：排行榜 -->
    <div id="modal-rank" class="modal-overlay hidden" onclick="closeModal('modal-rank', event)">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">实时战绩</div>
                <button class="close-btn" onclick="closeModal('modal-rank')">×</button>
            </div>
            <table class="rank-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>玩家</th>
                        <th>持有</th>
                        <th>借入</th>
                        <th>盈利</th>
                    </tr>
                </thead>
                <tbody id="rank-tbody"></tbody>
            </table>
            <button class="btn-danger" style="width: 100%; margin-top: 20px;" onclick="resetGame()">结束本局 (清空数据)</button>
        </div>
    </div>

    <!-- 模态框：下注 -->
    <div id="modal-bet" class="modal-overlay hidden" onclick="closeModal('modal-bet', event)">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">下注</div>
                <button class="close-btn" onclick="closeModal('modal-bet')">×</button>
            </div>

            <div class="form-group">
                <label class="form-label">操作玩家</label>
                <div id="bet-player-select" class="player-grid"></div>
                <div id="bet-player-info" class="info-pill">持有: 0</div>
            </div>

            <div id="bet-hint" style="color: var(--warning); font-size: 14px; margin-bottom: 10px;"></div>

            <div class="form-group">
                <label class="form-label">下注金额</label>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="setBetAmount('call')">跟注</button>
                    <button class="quick-btn" onclick="setBetAmount(10)">+10</button>
                    <button class="quick-btn" onclick="setBetAmount(50)">+50</button>
                    <button class="quick-btn" onclick="setBetAmount('allin')">All-in</button>
                </div>
                <input type="number" id="bet-amount" placeholder="0">
            </div>

            <button class="btn-primary" style="width: 100%;" onclick="submitBet()">确认下注</button>
        </div>
    </div>

    <!-- 模态框：银行 -->
    <div id="modal-bank" class="modal-overlay hidden" onclick="closeModal('modal-bank', event)">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">银行筹码管理</div>
                <button class="close-btn" onclick="closeModal('modal-bank')">×</button>
            </div>

            <div class="form-group">
                <label class="form-label">操作玩家</label>
                <div id="bank-player-select" class="player-grid"></div>
                <div id="bank-player-info" class="info-pill">持有: 0</div>
            </div>

            <div class="form-group" style="display: flex; gap: 10px;">
                <button class="btn-outline" style="flex: 1; background: #374151; color: white;" id="btn-type-get"
                    onclick="setBankType('get')">领取/借入</button>
                <button class="btn-outline" style="flex: 1;" id="btn-type-return"
                    onclick="setBankType('return')">归还</button>
            </div>

            <div class="form-group">
                <label class="form-label">金额</label>
                <input type="number" id="bank-amount" placeholder="输入金额">
            </div>

            <button class="btn-primary" style="width: 100%;" onclick="submitBank()">确认</button>
        </div>
    </div>

    <!-- 模态框：收米 (赢家) -->
    <div id="modal-win" class="modal-overlay hidden" onclick="closeModal('modal-win', event)">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">结算底池</div>
                <button class="close-btn" onclick="closeModal('modal-win')">×</button>
            </div>

            <div class="form-group">
                <label class="form-label">赢家</label>
                <div id="win-player-select" class="player-grid"></div>
            </div>

            <div class="form-group">
                <label class="form-label">收回金额 (默认全部)</label>
                <input type="number" id="win-amount">
                <div class="info-pill" style="margin-top: 5px;">当前底池: <span id="win-pot-hint">0</span></div>
            </div>

            <button class="btn-win"
                style="width: 100%; border-radius: 8px; padding: 12px; font-weight: bold; border: none;"
                onclick="submitWin()">确认收回</button>
            <div style="text-align: center; margin-top: 10px; color: var(--text-sub); font-size: 12px;">确认后将开始新的一手牌
            </div>
        </div>
    </div>

    <script>
        // --- 1. 全局状态 ---
        let state = {
            roomId: Math.floor(Math.random() * 90 + 10), // 10-99 随机房号
            pot: 0,
            players: [], // { id, name, stack, loan, roundBet }
            logs: [],
            setupPlayers: [] // 暂存 Setup 阶段的玩家名
        };

        let bankType = 'get'; // 银行操作类型

        // --- 2. 初始化与存储 ---
        function init() {
            const saved = localStorage.getItem('poker_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // 简单的迁移校验
                    if (parsed.players && parsed.players.length > 0) {
                        document.getElementById('btn-continue').classList.remove('hidden');
                        state.setupPlayers = parsed.players.map(p => p.name); // 恢复列表供展示
                        renderSetupList();
                    }
                } catch (e) {
                    localStorage.removeItem('poker_state');
                }
            }
        }

        function saveState() {
            localStorage.setItem('poker_state', JSON.stringify(state));
        }

        function renderSetupList() {
            const list = document.getElementById('player-list');
            list.innerHTML = state.setupPlayers.map((name, index) => `
                <div class="player-item">
                    <span>${name}</span>
                    <button style="color: var(--danger); background: none;" onclick="removePlayer(${index})">删除</button>
                </div>
            `).join('');
        }

        // --- 3. 首页逻辑 ---
        function addPlayer() {
            const input = document.getElementById('setup-player-name');
            const name = input.value.trim();
            if (name) {
                state.setupPlayers.push(name);
                input.value = '';
                renderSetupList();
            }
        }

        function removePlayer(index) {
            state.setupPlayers.splice(index, 1);
            renderSetupList();
        }

        function startGame() {
            if (state.setupPlayers.length < 2) {
                alert("至少需要2名玩家");
                return;
            }
            const initialStack = parseInt(document.getElementById('setup-initial-stack').value) || 1000;

            // 初始化全新数据
            state.players = state.setupPlayers.map((name, idx) => ({
                id: idx,
                name: name,
                stack: initialStack,
                loan: initialStack, // <--- 修改点：初始本金视为向银行借入
                roundBet: 0
            }));
            state.pot = 0;
            state.logs = [];
            state.roomId = Math.floor(Math.random() * 90 + 10);

            addLog("系统", `房间创建成功，初始筹码 ${initialStack}`);
            enterGameView();
        }

        function continueGame() {
            const saved = localStorage.getItem('poker_state');
            if (saved) {
                state = JSON.parse(saved);
                enterGameView();
                // 恢复日志滚动到底部
                setTimeout(() => {
                    const el = document.getElementById('log-container');
                    el.scrollTop = el.scrollHeight;
                }, 100);
            }
        }

        function enterGameView() {
            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-game').classList.remove('hidden');
            document.getElementById('room-id').innerText = `桌号: #${state.roomId}`;
            renderGame();
        }

        function resetGame() {
            if (confirm("确定要清空所有数据并返回首页吗？")) {
                localStorage.removeItem('poker_state');
                location.reload();
            }
        }

        // --- 4. 游戏核心逻辑与渲染 ---

        function renderGame() {
            // 更新底池
            document.getElementById('display-pot').innerText = state.pot;

            // 更新日志
            const logContainer = document.getElementById('log-container');
            logContainer.innerHTML = state.logs.map(log => `
                <div class="log-item">
                    <span class="log-time">${log.time}</span>
                    <span>${log.msg}</span>
                </div>
            `).join('');
            // 自动滚动到底部
            logContainer.scrollTop = logContainer.scrollHeight;

            saveState();
        }

        function addLog(player, action) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            let htmlMsg = "";
            if (player === "系统") {
                htmlMsg = action;
            } else {
                htmlMsg = `<span class="log-highlight">[${player}]</span> ${action}`;
            }

            state.logs.push({ time: timeStr, msg: htmlMsg });
            renderGame();
        }

        function getPlayer(id) {
            return state.players.find(p => p.id == id);
        }

        // --- 5. 模态框逻辑 ---

        // 通用打开/关闭
        function closeModal(id, e) {
            if (e && e.target !== e.currentTarget) return; // 防止点击内容区关闭
            document.getElementById(id).classList.add('hidden');
        }

        // 渲染玩家选择按钮
        // containerId: 容器ID
        // onSelectCallback: 选中后触发的回调函数（可选，用于下注时更新提示）
        function renderPlayerSelector(containerId, onSelectCallback) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; // 清空

            state.players.forEach((p, index) => {
                const btn = document.createElement('button');
                btn.className = 'p-btn';
                btn.innerText = p.name;
                btn.dataset.pid = p.id;

                // 默认选中第一个人
                if (index === 0) btn.classList.add('active');

                btn.onclick = () => {
                    // 移除同级兄弟的 active 类
                    Array.from(container.children).forEach(c => c.classList.remove('active'));
                    // 激活自己
                    btn.classList.add('active');
                    // 触发回调
                    if (onSelectCallback) onSelectCallback(p.id);
                };

                container.appendChild(btn);
            });

            // 初始化完成后，手动触发一次回调（为了更新默认选中者的提示信息）
            if (state.players.length > 0 && onSelectCallback) {
                onSelectCallback(state.players[0].id);
            }
        }

        // 获取当前选中的玩家ID
        function getSelectedPlayerId(containerId) {
            const container = document.getElementById(containerId);
            const activeBtn = container.querySelector('.p-btn.active');
            return activeBtn ? activeBtn.dataset.pid : null;
        }

        // === 银行操作 ===
        function showBankModal() {
            renderPlayerSelector('bank-player-select', () => updateBankHint());
            document.getElementById('bank-amount').value = '';
            document.getElementById('modal-bank').classList.remove('hidden');
            setBankType('get'); // 默认领取
        }

        function updateBankHint() {
            const pId = getSelectedPlayerId('bank-player-select');
            if (pId === null) return;

            const player = getPlayer(pId);
            document.getElementById('bank-player-info').innerText = `持有: ${player.stack}`;
        }

        function setBankType(type) {
            bankType = type;
            const btnGet = document.getElementById('btn-type-get');
            const btnRet = document.getElementById('btn-type-return');
            if (type === 'get') {
                btnGet.style.background = '#374151'; btnGet.style.color = 'white';
                btnRet.style.background = 'transparent'; btnRet.style.color = 'var(--text-sub)';
            } else {
                btnRet.style.background = '#374151'; btnRet.style.color = 'white';
                btnGet.style.background = 'transparent'; btnGet.style.color = 'var(--text-sub)';
            }
        }

        function submitBank() {
            const pId = getSelectedPlayerId('bank-player-select');
            const amount = parseInt(document.getElementById('bank-amount').value);
            const player = getPlayer(pId);

            if (!amount || amount <= 0) return alert("请输入有效数字");

            if (bankType === 'get') {
                player.stack += amount;
                player.loan += amount;
                addLog(player.name, `向银行领取(借入) ${amount}`);
            } else {
                if (player.stack < amount) return alert("手中筹码不足以归还");
                player.stack -= amount;
                player.loan -= amount;
                addLog(player.name, `归还银行 ${amount}`);
            }
            closeModal('modal-bank');
        }

        // === 下注操作 ===
        function showBetModal() {
            const select = renderPlayerSelector('bet-player-select', () => updateBetHint());
            document.getElementById('bet-amount').value = '';
            document.getElementById('modal-bet').classList.remove('hidden');
            updateBetHint();
        }

        function updateBetHint() {
            const pId = getSelectedPlayerId('bet-player-select');
            if (pId === null) return;

            const player = getPlayer(pId);
            document.getElementById('bet-player-info').innerText = `持有: ${player.stack}`;

            // 计算跟注逻辑
            // 找出当前场上本轮下注最多的人下注了多少
            const maxBet = Math.max(...state.players.map(p => p.roundBet));
            const toCall = maxBet - player.roundBet;

            const hintDiv = document.getElementById('bet-hint');
            if (toCall > 0) {
                hintDiv.innerText = `需跟注: ${toCall} (本轮已下 ${player.roundBet})`;
                hintDiv.dataset.call = toCall;
            } else {
                if (maxBet === 0) hintDiv.innerText = "当前无人下注";
                else hintDiv.innerText = "您是当前领先者 (High Bet)";
                hintDiv.dataset.call = 0;
            }
        }

        function setBetAmount(val) {
            const pId = getSelectedPlayerId('bet-player-select');
            const player = getPlayer(pId);
            const input = document.getElementById('bet-amount');
            let currentVal = parseInt(input.value) || 0;

            if (val === 'allin') {
                input.value = player.stack;
            } else if (val === 'call') {
                const callAmt = parseInt(document.getElementById('bet-hint').dataset.call) || 0;
                // 如果没有需要跟注的，或者跟注金额为0，通常意味着check或作为开局者，这里为了体验，若为0则不填
                if (callAmt > 0) input.value = callAmt;
            } else {
                input.value = currentVal + val;
            }
        }

        function submitBet() {
            const pId = getSelectedPlayerId('bet-player-select');
            const amount = parseInt(document.getElementById('bet-amount').value);
            const player = getPlayer(pId);

            if (!amount || amount <= 0) return alert("请输入有效数字");
            if (player.stack < amount) return alert("筹码不足");

            player.stack -= amount;
            player.roundBet += amount; // 增加本轮已下注额
            state.pot += amount;

            addLog(player.name, `下注 ${amount}`);
            closeModal('modal-bet');
        }

        // === 结算 (赢家) ===
        function showWinModal() {
            renderPlayerSelector('win-player-select');
            document.getElementById('win-amount').value = state.pot; // 默认全收
            document.getElementById('win-pot-hint').innerText = state.pot;
            document.getElementById('modal-win').classList.remove('hidden');
        }

        function submitWin() {
            const pId = getSelectedPlayerId('win-player-select');
            const amount = parseInt(document.getElementById('win-amount').value);
            const player = getPlayer(pId);

            if (amount < 0) return alert("金额错误");
            if (amount > state.pot) return alert("不能超过当前底池");

            player.stack += amount;
            state.pot -= amount;

            // 核心：赢钱意味着这一手牌结束，重置所有人的 roundBet
            state.players.forEach(p => p.roundBet = 0);

            // 样式化日志
            addLog(player.name, `<span class="log-win">赢取底池 ${amount}</span> (本局结束)`);
            closeModal('modal-win');
        }

        // === 排行榜 ===
        function showRankModal() {
            const tbody = document.getElementById('rank-tbody');

            // 复制并排序
            const sorted = [...state.players].sort((a, b) => {
                const scoreA = a.stack - a.loan;
                const scoreB = b.stack - b.loan;
                return scoreB - scoreA;
            });

            tbody.innerHTML = sorted.map((p, i) => {
                const score = p.stack - p.loan;
                const scoreClass = score >= 0 ? 'score-pos' : 'score-neg';
                const scoreStr = score >= 0 ? `+${score}` : score;

                // 计算原始买入本金（近似计算：假设所有Loan都是买入）
                // 盈利 = (Stack - Loan) - (InitialStack? 不，这只是积分记账，通常积分 = stack - loan)
                // 需求中定义积分 = 手中筹码 - 借用筹码

                return `
                <tr>
                    <td>${i + 1}</td>
                    <td>${p.name}</td>
                    <td>${p.stack}</td>
                    <td>${p.loan}</td>
                    <td class="${scoreClass}" style="font-weight:bold;">${scoreStr}</td>
                </tr>
                `;
            }).join('');

            document.getElementById('modal-rank').classList.remove('hidden');
        }

        // 启动初始化
        init();

    </script>
</body>

</html>
